name: cross_origin_lib
description: Shared lib for Patrol cross-origin opener+DUT PoC.
publish_to: none
version: 0.0.1

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_test:
    sdk: flutter
  meta: ^1.10.0
  patrol:
    path: ../../../packages/patrol
  # Hosted (not path) to avoid clash with patrol's transitive patrol_finders
  # in controller_app. Match the constraint patrol itself uses.
  patrol_finders: ^3.1.0
  web: ^1.1.1
  yaml: ^3.1.0

executables:
  orchestrate:
