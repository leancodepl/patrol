name: test macos

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  run_tests:
    name: Flutter ${{ matrix.flutter-version }} on ${{ matrix.device_model }}
    runs-on: macos-latest
    timeout-minutes: 25
    outputs:
      SLACK_MESSAGE_TITLE: Flutter ${{ matrix.flutter-version }} on ${{ matrix.os }}
      TESTS_EXIT_CODE: ${{ steps.tests_step.outputs.TESTS_EXIT_CODE }}
      FAILURE_STATUS: ${{ steps.status_step.outputs.FAILURE_STATUS }}
      ERROR_STATUS: ${{ steps.status_step.outputs.ERROR_STATUS }}

    strategy:
      fail-fast: false
      matrix:
        flutter-version: ['3.38.x']
        flutter-channel: ['stable']
        device_model: [macOS]
        os: [macOS]

    defaults:
      run:
        working-directory: dev/e2e_app

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Add current platform to Gemfile
        working-directory: dev/e2e_app/macos
        run: bundle lock --add-platform ruby

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: dev/e2e_app/macos

      - name: Set up fastlane
        working-directory: dev/e2e_app/macos
        run: bundle install

      - name: Run fastlane match
        working-directory: dev/e2e_app/macos
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          GIT_USERNAME: ${{ secrets.PATROL_FASTLANE_CERTS_REPO_TOKEN_USERNAME }}
          GIT_TOKEN: ${{ secrets.PATROL_FASTLANE_CERTS_REPO_TOKEN }}
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_KEY: ${{ secrets.APP_STORE_KEY }}
          MATCH_GIT_PRIVATE_KEY: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}
        run: bundle exec fastlane mac certificates

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter-version }}
          channel: ${{ matrix.flutter-channel }}

      - name: Preload Flutter artifacts
        run: flutter precache --macos

      - name: Set up Melos and activate workspace
        working-directory: .
        run: |
          dart pub global activate melos
          melos bootstrap

      - name: Set up Patrol CLI
        working-directory: packages/patrol_cli
        run: dart pub global activate --source path . && patrol

      - name: Start screen recording
        run: |
          screencapture -v macos_screen_recording.mov &
          echo $! > /tmp/screencapture_pid
          echo "Screen recording started (PID: $(cat /tmp/screencapture_pid))"

      - name: Start log capture
        run: |
          log stream --predicate 'processImagePath contains "e2e_app" or processImagePath contains "patrol" or processImagePath contains "Runner"' --style compact > macos_app_logs.txt 2>&1 &
          echo $! > /tmp/logstream_pid
          echo "Log capture started (PID: $(cat /tmp/logstream_pid))"

      - name: Run UI tests
        id: tests_step
        run: |
          TESTS_EXIT_CODE=0
          patrol test -t patrol_test/macos --verbose -d macos || TESTS_EXIT_CODE=$?

          echo "TESTS_EXIT_CODE=$TESTS_EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $TESTS_EXIT_CODE

      - name: Stop screen recording
        if: always()
        run: |
          if [ -f /tmp/screencapture_pid ]; then
            kill -SIGINT $(cat /tmp/screencapture_pid) 2>/dev/null || true
            sleep 2
            kill -9 $(cat /tmp/screencapture_pid) 2>/dev/null || true
          fi

      - name: Stop log capture
        if: always()
        run: |
          if [ -f /tmp/logstream_pid ]; then
            kill -SIGINT $(cat /tmp/logstream_pid) 2>/dev/null || true
            sleep 1
            kill -9 $(cat /tmp/logstream_pid) 2>/dev/null || true
          fi

      - name: Check if something went wrong
        id: status_step
        if: always()
        run: >
          if [ -z ${{ steps.tests_step.outputs.TESTS_EXIT_CODE }} ]; then 
            echo "ERROR_STATUS=error" >> "$GITHUB_OUTPUT";
          elif [ ! ${{ steps.tests_step.outputs.TESTS_EXIT_CODE }} == 0 ]; then
            echo "FAILURE_STATUS=failure" >> "$GITHUB_OUTPUT";
          fi;

      - name: Find xcresult path
        if: ${{ (failure() || success()) && contains(fromJson('["success", "failure"]'), steps.tests_step.conclusion) }}
        run: |
          brew install coreutils # to provide realpath binary
          echo "XCRESULT_PATH=$(realpath build/macos_results_*.xcresult)" >> $GITHUB_ENV

      - name: Install xcresultparser
        if: ${{ (failure() || success()) && contains(fromJson('["success", "failure"]'), steps.tests_step.conclusion) }}
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: brew install xcresultparser

      - name: Parse xcresult to JUnit format
        if: ${{ (failure() || success()) && contains(fromJson('["success", "failure"]'), steps.tests_step.conclusion) }}
        run: |
          mkdir -p test-results
          xcresultparser -o junit "${{ env.XCRESULT_PATH }}" > test-results/junit-report.xml

      - name: Convert JUnit to CTRF format
        if: ${{ (failure() || success()) && contains(fromJson('["success", "failure"]'), steps.tests_step.conclusion) }}
        run: |
          npx junit-to-ctrf test-results/junit-report.xml -o test-results/ctrf-report.json

      - name: Publish test report to summary
        if: ${{ (failure() || success()) && contains(fromJson('["success", "failure"]'), steps.tests_step.conclusion) }}
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: '${{ github.workspace }}/dev/e2e_app/test-results/ctrf-report.json'
          summary-report: true
          failed-report: true
          github-report: true
          title: 'Patrol tests on ${{ matrix.device_model }}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload XCRESULT test result to artifacts
        if: ${{ (failure() || success()) && contains(fromJson('["success", "failure"]'), steps.tests_step.conclusion) }}
        uses: actions/upload-artifact@v4
        with:
          name: Test result from ${{ matrix.device_model }}.xcresult
          path: ${{ env.XCRESULT_PATH }}

      - name: Upload screen recording to artifacts
        if: ${{ (failure() || success()) && contains(fromJson('["success", "failure"]'), steps.tests_step.conclusion) }}
        uses: actions/upload-artifact@v4
        with:
          name: Screen recording from ${{ matrix.device_model }}
          path: ${{ github.workspace }}/dev/e2e_app/macos_screen_recording.mov

      - name: Upload macOS logs to artifacts
        if: ${{ (failure() || success()) && contains(fromJson('["success", "failure"]'), steps.tests_step.conclusion) }}
        uses: actions/upload-artifact@v4
        with:
          name: Logs from ${{ matrix.device_model }}
          path: ${{ github.workspace }}/dev/e2e_app/macos_app_logs.txt

  call_send_slack_message:
    name: Notify on Slack
    uses: ./.github/workflows/send-slack-message.yaml
    needs: run_tests
    if: always()
    with:
      TESTS_EXIT_CODE: ${{ needs.run_tests.outputs.TESTS_EXIT_CODE }}
      FAILURE_STATUS: ${{ needs.run_tests.outputs.FAILURE_STATUS }}
      ERROR_STATUS: ${{ needs.run_tests.outputs.ERROR_STATUS }}
      SLACK_MESSAGE_TITLE: ${{ needs.run_tests.outputs.SLACK_MESSAGE_TITLE }}
    secrets: inherit
