group "pl.leancode.patrol"
version "1.0-SNAPSHOT"

buildscript {
    ext.kotlin_version = "2.1.0"
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }

    dependencies {
        classpath "com.android.tools.build:gradle:8.2.2"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        classpath "org.jlleitschuh.gradle:ktlint-gradle:11.5.0"
    }
}

apply plugin: "com.android.library"

def agpMajor = com.android.Version.ANDROID_GRADLE_PLUGIN_VERSION.tokenize('.')[0] as int
// Host apps control Kotlin compilation mode via gradle.properties (android.builtInKotlin).
// false (Flutter default for unmigrated apps): apply KGP on AGP 9+.
// true (fully migrated apps): skip KGP and rely on AGP built-in Kotlin on AGP 9+.
// AGP < 9 always uses KGP regardless of the flag. This plugin supports both paths.
def usesBuiltInKotlin = project.findProperty("android.builtInKotlin") == "true"
if (agpMajor < 9 || !usesBuiltInKotlin) {
    apply plugin: "kotlin-android"
}

apply plugin: "org.jlleitschuh.gradle.ktlint"

ktlint {
    filter {
        exclude("**/contracts/**")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

android {
    namespace "pl.leancode.patrol"
    compileSdk 35

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        minSdk 21
        buildConfigField("String", "PATROL_APP_PORT", project.hasProperty('app-server-port') ? '"' + project.getProperty('app-server-port') + '"' : '""')
        buildConfigField("String", "PATROL_TEST_PORT", project.hasProperty('test-server-port') ? '"' + project.getProperty('test-server-port') + '"' : '""')
    }

    buildFeatures {
        buildConfig true
    }

    dependencies {
        // TODO: These dependencies should not be added to release builds.
        // https://github.com/flutter/flutter/issues/56591
        api "junit:junit:4.13.2"

        api "androidx.test:runner:1.5.1"
        api "androidx.test.espresso:espresso-core:3.5.0"
        api "androidx.test.uiautomator:uiautomator:2.3.0"

        implementation platform("org.http4k:http4k-bom:5.47.0.0")
        implementation "org.http4k:http4k-core"
        implementation "com.squareup.okhttp:okhttp:2.7.5" // See https://github.com/square/okhttp/issues/8031
        implementation "org.http4k:http4k-server-ktorcio"
        implementation "com.google.code.gson:gson:2.10.1"
        implementation "io.ktor:ktor-client-core:3.0.3"
        implementation "io.ktor:ktor-client-cio:3.0.3"
        implementation "io.ktor:ktor-client-content-negotiation:3.0.3"
        implementation "io.ktor:ktor-serialization-gson:3.0.3"

        testImplementation "org.jetbrains.kotlin:kotlin-test"
    }
}

plugins.withId("org.jetbrains.kotlin.android") {
    kotlin {
        compilerOptions {
            jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_1_8
        }
    }
}

// Test Logging
tasks.withType(Test).configureEach {
    testLogging {
        events "passed", "skipped", "failed"
    }
}
